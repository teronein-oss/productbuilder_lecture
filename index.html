<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World & Document Saver</title>
  <link href='/style.css' rel='stylesheet'>
  <!-- PDF 생성을 위한 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 원래 있던 기능 -->
    <h1>Hello, world!</h1>
    <button id="originalBtn" onclick="console.log('hello');">Press me</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <!-- 새로 추가하는 저장 기능 -->
    <h3>문서 저장 도구</h3>
    <textarea id="content" placeholder="여기에 저장할 내용을 입력하세요..."></textarea>
    
    <div class="controls">
      <select id="format">
        <option value="pdf">PDF (*.pdf)</option>
        <option value="word">워드 (*.doc)</option>
      </select>
      <button id="saveBtn">저장하기</button>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
